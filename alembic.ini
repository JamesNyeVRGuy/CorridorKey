# Alembic configuration for CorridorKey (CRKY-49).
#
# Run migrations:
#   CK_DATABASE_URL=postgresql://... uv run alembic upgrade head
#
# Create a new migration:
#   CK_DATABASE_URL=postgresql://... uv run alembic revision -m "description"

[alembic]
script_location = web/api/migrations
prepend_sys_path = .

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
