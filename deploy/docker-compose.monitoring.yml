# Grafana + Prometheus + Loki monitoring stack for CorridorKey (CRKY-27, CRKY-50)
#
# Add to an existing deployment:
#   docker compose -f docker-compose.dev.yml -f docker-compose.monitoring.yml up -d
#
# Or standalone (assumes corridorkey-web is reachable):
#   docker compose -f docker-compose.monitoring.yml up -d
#
# Prerequisites:
#   Set CK_METRICS_ENABLED=true on the web server
#   Set CK_LOG_FORMAT=json for structured log ingestion
#
# Access:
#   Grafana:    http://localhost:3001  (admin / admin)
#   Prometheus: http://localhost:9090
#   Loki:       http://localhost:3100  (internal — query via Grafana)

services:
  prometheus:
    image: prom/prometheus:v2.53.0
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle

  loki:
    image: grafana/loki:3.1.0
    restart: unless-stopped
    ports:
      - "${LOKI_PORT:-3100}:3100"
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml

  promtail:
    image: grafana/promtail:3.1.0
    restart: unless-stopped
    depends_on:
      - loki
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/log/docker:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml

  grafana:
    image: grafana/grafana:11.1.0
    restart: unless-stopped
    depends_on:
      - prometheus
      - loki
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=${GF_ROOT_URL:-http://localhost:3001}
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/platform-overview.json
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana

volumes:
  prometheus-data:
  grafana-data:
  loki-data:
